<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Generator PPWG</title>
  <style>
    :root {
      --bg: #e7eaee;
      --panel: #f7f8fa;
      --ink: #171a1f;
      --muted: #4f5965;
      --line: #1e232b;
      --focus: #005bbb;
      --accent: #0d6b3d;
      --accent-dark: #084d2b;
      --danger: #b42318;
      --paper: #ffffff;
      --soft: #d1d7df;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 18px;
      line-height: 1.35;
    }

    .app-header {
      padding: 18px 24px 10px;
      border-bottom: 3px solid #c7ced8;
      background: #f4f6f8;
    }

    .app-header h1 {
      margin: 0;
      font-size: 30px;
      font-weight: 800;
    }

    .app-header p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 18px;
    }

    .app-shell {
      display: grid;
      grid-template-columns: minmax(380px, 500px) minmax(520px, 1fr);
      gap: 20px;
      max-width: 1320px;
      margin: 0 auto;
      padding: 20px;
    }

    .form-panel,
    .preview-panel {
      min-width: 0;
    }

    .form-panel {
      align-self: start;
      padding: 18px;
      border: 3px solid #aeb8c4;
      border-radius: 6px;
      background: var(--panel);
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 19px;
      font-weight: 800;
    }

    input,
    textarea {
      display: block;
      width: 100%;
      border: 3px solid var(--line);
      border-radius: 5px;
      background: #ffffff;
      color: var(--ink);
      font: 700 22px Arial, Helvetica, sans-serif;
      outline: none;
    }

    input {
      min-height: 56px;
      padding: 10px 12px;
    }

    textarea {
      min-height: 88px;
      padding: 10px 12px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 4px rgba(0, 91, 187, 0.16);
    }

    .field-error {
      border-color: var(--danger) !important;
      box-shadow: 0 0 0 4px rgba(180, 35, 24, 0.13) !important;
    }

    .two-columns {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 210px;
      gap: 12px;
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .generate-button {
      width: 100%;
      min-height: 92px;
      border: 4px solid #06371f;
      border-radius: 7px;
      background: var(--accent);
      color: #ffffff;
      cursor: pointer;
      font: 900 30px Arial, Helvetica, sans-serif;
    }

    .generate-button:hover,
    .generate-button:focus {
      background: var(--accent-dark);
    }

    .secondary-actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .secondary-button {
      min-height: 48px;
      padding: 8px 14px;
      border: 2px solid #7b8795;
      border-radius: 5px;
      background: #ffffff;
      color: var(--ink);
      cursor: pointer;
      font: 800 18px Arial, Helvetica, sans-serif;
    }

    .message {
      min-height: 28px;
      color: var(--muted);
      font-weight: 700;
    }

    .message.error {
      color: var(--danger);
    }

    .preview-panel {
      overflow-x: auto;
      padding: 16px;
      border: 3px solid #aeb8c4;
      border-radius: 6px;
      background: #dfe4ea;
    }

    .preview-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .preview-heading h2 {
      margin: 0;
      font-size: 24px;
    }

    .preview-heading span {
      color: var(--muted);
      font-size: 16px;
      font-weight: 700;
    }

    .print-page {
      width: 190mm;
      min-height: 277mm;
      margin: 0 auto;
      padding: 4mm 0 0;
      background: var(--paper);
      box-shadow: 0 6px 26px rgba(15, 23, 42, 0.22);
    }

    .payment-copy {
      position: relative;
      width: 150mm;
      height: 105mm;
      margin: 0 auto 8mm;
      color: #e60000;
      background: #ffffff;
      page-break-inside: avoid;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    .payment-copy:last-child {
      margin-bottom: 0;
    }

    .cut-line {
      height: 0;
      width: 150mm;
      margin: 0 auto 8mm;
      border-top: 0.35mm dashed #e60000;
      opacity: 0.65;
    }

    .blankiet {
      position: absolute;
      inset: 0;
      border: 0.35mm solid #e60000;
      background: #f6c7c9;
    }

    .corner {
      position: absolute;
      z-index: 7;
      width: 11mm;
      height: 11mm;
      pointer-events: none;
    }

    .corner::before,
    .corner::after {
      content: "";
      position: absolute;
      background: #111111;
    }

    .corner::before {
      width: 11mm;
      height: 0.55mm;
    }

    .corner::after {
      width: 0.55mm;
      height: 11mm;
    }

    .corner.top-left {
      left: 5mm;
      top: 3mm;
    }

    .corner.top-left::before,
    .corner.top-left::after {
      left: 0;
      top: 0;
    }

    .corner.top-right {
      right: 3mm;
      top: 3mm;
    }

    .corner.top-right::before {
      right: 0;
      top: 0;
    }

    .corner.top-right::after {
      right: 0;
      top: 0;
    }

    .corner.bottom-left {
      left: 5mm;
      bottom: 18mm;
    }

    .corner.bottom-left::before {
      left: 0;
      bottom: 0;
    }

    .corner.bottom-left::after {
      left: 0;
      bottom: 0;
    }

    .blankiet::before {
      content: "";
      position: absolute;
      display: none;
      left: 7.5mm;
      right: 0;
      top: 0;
      bottom: 22mm;
      background:
        repeating-linear-gradient(
          to right,
          transparent 0,
          transparent 6.05mm,
          rgba(230, 0, 0, 0.18) 6.05mm,
          rgba(230, 0, 0, 0.18) 6.35mm
        ),
        repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent 9.1mm,
          rgba(230, 0, 0, 0.16) 9.1mm,
          rgba(230, 0, 0, 0.16) 9.45mm
        );
      pointer-events: none;
    }

    .side-title,
    .side-bank {
      position: absolute;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e60000;
      font-size: 9pt;
      font-weight: 800;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      text-align: center;
    }

    .side-title {
      left: 0;
      top: 23mm;
      width: 7.5mm;
      height: 57mm;
      border-right: 0.3mm solid #e60000;
    }

    .side-bank {
      right: 0;
      top: 48mm;
      width: 8mm;
      height: 30mm;
    }

    .form-main {
      position: absolute;
      z-index: 2;
      left: 0;
      right: 0;
      top: 0;
      bottom: 24mm;
    }

    .form-main::before {
      content: "";
      position: absolute;
      left: 8.1mm;
      top: 2.1mm;
      width: 135mm;
      height: 84.1mm;
      border: 0.23mm solid #e60000;
      background: #f6c7c9;
    }

    .box-row,
    .account-row,
    .amount-row,
    .date-row {
      position: absolute;
      left: 8.1mm;
      right: auto;
      display: grid;
      color: #111111;
    }

    .box-row {
      width: 135mm;
      grid-template-columns: repeat(27, 5mm);
      height: 5.5mm;
    }

    .account-row {
      width: 130mm;
      grid-template-columns: repeat(26, 5mm);
      height: 5.5mm;
      border: 0.6mm solid #d01a09;
      background: #ffffff;
    }

    .amount-row {
      width: 60mm;
      grid-template-columns: repeat(12, 5mm);
      height: 5.5mm;
      border: 0.6mm solid #d01a09;
      background: #ffffff;
    }

    .date-row {
      grid-template-columns: repeat(8, 1fr);
      height: 8.7mm;
    }

    .char-cell {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      border: 0.22mm solid #e60000;
      background: #ffffff;
      color: #111111;
      font-size: 11pt;
      font-weight: 800;
      line-height: 1;
      text-transform: uppercase;
    }

    .account-row .char-cell,
    .amount-row .char-cell,
    .date-row .char-cell {
      border-color: #e60000;
      color: #111111;
      font-size: 13pt;
      font-weight: 900;
    }

    .box-row .char-cell {
      font-size: 12pt;
      font-weight: 500;
      letter-spacing: 0;
    }

    .payer-account .char-cell {
      font-size: 10.5pt;
      text-transform: none;
    }

    .field-caption {
      position: absolute;
      z-index: 5;
      left: 8.9mm;
      top: 2.2mm;
      color: #e60000;
      font-size: 5.4pt;
      font-weight: 900;
      line-height: 1;
      background: #f6c7c9;
      padding-right: 0.7mm;
    }

    .payer-account-caption {
      top: 36.7mm;
    }

    .top-name-1 { top: 3.5mm; }
    .top-name-2 { top: 12.2mm; }
    .receiver-account {
      top: 20.7mm;
      left: 21.7mm;
      width: 121.4mm;
      grid-template-columns: repeat(26, 1fr);
    }
    .payer-account { top: 38.0mm; }
    .payer-name-1 { top: 46.5mm; }
    .payer-name-2 { top: 55.0mm; }
    .title-1 { top: 63.3mm; }
    .title-2 { top: 71.8mm; }

    .lk-box {
      position: absolute;
      z-index: 4;
      left: 8.1mm;
      top: 19.2mm;
      width: 13.6mm;
      height: 7.1mm;
      border: 0.35mm solid #e60000;
      background: #ffffff;
    }

    .lk-box .field-caption {
      top: 1.2mm;
    }

    .payment-kind {
      position: absolute;
      z-index: 5;
      left: 47.8mm;
      top: 29.9mm;
      display: flex;
      gap: 1.1mm;
      align-items: center;
      color: #e60000;
      font-size: 15pt;
      font-weight: 900;
    }

    .payment-kind span:not(.star) {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 5.2mm;
      height: 5.2mm;
      border: 0.35mm solid #e60000;
      background: #ffffff;
    }

    .payment-kind .star {
      font-size: 8pt;
    }

    .currency-box {
      position: absolute;
      z-index: 5;
      left: 63mm;
      top: 28.8mm;
      width: 18mm;
      height: 8.7mm;
      background: #f6c7c9;
    }

    .currency-box .field-caption {
      top: 0.6mm;
    }

    .currency-value {
      position: absolute;
      left: 2.8mm;
      bottom: 0.2mm;
      color: #111111;
      font-size: 16pt;
      font-weight: 900;
      letter-spacing: 1.2mm;
    }

    .amount-box {
      position: absolute;
      z-index: 5;
      left: 83mm;
      right: auto;
      top: 29.4mm;
      width: 60mm;
    }

    .amount-box .field-caption {
      top: -4.3mm;
      left: 1mm;
    }

    .amount-box .amount-row {
      left: 0;
    }

    .bottom-strip {
      position: absolute;
      z-index: 2;
      left: 0;
      right: 0;
      bottom: 0;
      height: 25.5mm;
      border-top: 0.65mm solid #e60000;
      background: rgba(230, 0, 0, 0.13);
    }

    .bank-note {
      position: absolute;
      left: 0;
      top: 0;
      width: 7.5mm;
      height: 25.5mm;
      border-right: 0.35mm solid #e60000;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e60000;
      font-size: 5.4pt;
      font-weight: 800;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      text-align: center;
    }

    .signature-box {
      position: absolute;
      left: 8.1mm;
      top: 3.7mm;
      width: 68.4mm;
      height: 21.2mm;
      border: 0.35mm solid #e60000;
      border-bottom: 0;
      background: #ffffff;
    }

    .signature-box span {
      position: absolute;
      left: 20mm;
      bottom: 1.4mm;
      color: #e60000;
      font-size: 6pt;
      font-weight: 900;
    }

    .fee-box {
      position: absolute;
      left: 76.5mm;
      top: 12.2mm;
      width: 45.5mm;
      height: 13.3mm;
      border: 0.35mm solid #e60000;
      background: #ffffff;
    }

    .fee-box span {
      position: absolute;
      left: 6mm;
      top: 6mm;
      color: #e60000;
      font-size: 6pt;
      font-weight: 900;
    }

    .stamp-box {
      position: absolute;
      left: 122mm;
      top: 3.7mm;
      width: 23mm;
      height: 21.2mm;
      border: 0.35mm solid #e60000;
      background: #ffffff;
    }

    .stamp-circle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 16mm;
      height: 16mm;
      border: 0.35mm dashed #e60000;
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    .form-number {
      position: absolute;
      right: 0;
      top: 3.7mm;
      width: 14.5mm;
      height: 9mm;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 0.35mm solid #e60000;
      background: #ffffff;
      color: #e60000;
      font-size: 10pt;
      font-weight: 900;
      letter-spacing: 0.4mm;
    }

    .copy-number {
      position: absolute;
      right: 1mm;
      bottom: 1mm;
      color: #e60000;
      font-size: 5.5pt;
      font-weight: 900;
    }

    .signature-date {
      position: absolute;
      left: 3mm;
      top: 2.5mm;
      color: #111111;
      font-size: 8pt;
      font-weight: 900;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1040px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .preview-panel {
        padding: 12px;
      }
    }

    @media (max-width: 620px) {
      body {
        font-size: 17px;
      }

      .app-header {
        padding: 16px;
      }

      .app-header h1 {
        font-size: 26px;
      }

      .app-shell {
        padding: 12px;
      }

      .two-columns {
        grid-template-columns: 1fr;
      }

      .secondary-actions {
        flex-direction: column;
      }
    }

    @page {
      size: A4 portrait;
      margin: 10mm;
    }

    @media print {
      body {
        margin: 0;
        background: #ffffff;
      }

      .app-header,
      .form-panel,
      .preview-heading {
        display: none !important;
      }

      .app-shell,
      .preview-panel {
        display: block;
        width: auto;
        margin: 0;
        padding: 0;
        border: 0;
        background: #ffffff;
        overflow: visible;
      }

      .print-page {
        width: 190mm;
        min-height: auto;
        margin: 0;
        box-shadow: none;
      }

      .payment-copy {
        break-inside: avoid;
      }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <h1>Generator druku PPWG</h1>
    <p>Duże pola, wyraźne kontury i dwie takie same kopie na jednej stronie A4.</p>
  </header>

  <main class="app-shell">
    <section class="form-panel" aria-label="Dane przelewu">
      <form id="ppwgForm" class="form-grid" novalidate>
        <div>
          <label for="receiverName">Nazwa odbiorcy</label>
          <textarea id="receiverName" name="receiverName" autocomplete="organization" required></textarea>
        </div>

        <div>
          <label for="receiverAddress">Adres odbiorcy</label>
          <textarea id="receiverAddress" name="receiverAddress" autocomplete="street-address"></textarea>
        </div>

        <div>
          <label for="accountNumber">Numer rachunku odbiorcy</label>
          <input id="accountNumber" name="accountNumber" inputmode="numeric" autocomplete="off" placeholder="26 cyfr" required>
        </div>

        <div class="two-columns">
          <div>
            <label for="amount">Kwota</label>
            <input id="amount" name="amount" inputmode="decimal" autocomplete="off" placeholder="np. 123,45" required>
          </div>
          <div>
            <label for="paymentDate">Data</label>
            <input id="paymentDate" name="paymentDate" type="date" required>
          </div>
        </div>

        <div>
          <label for="payerName">Nazwa zleceniodawcy / wpłacającego</label>
          <textarea id="payerName" name="payerName" autocomplete="name" required></textarea>
        </div>

        <div>
          <label for="payerAddress">Adres zleceniodawcy / wpłacającego</label>
          <textarea id="payerAddress" name="payerAddress" autocomplete="street-address"></textarea>
        </div>

        <div>
          <label for="paymentTitle">Tytułem</label>
          <textarea id="paymentTitle" name="paymentTitle" required></textarea>
        </div>

        <div class="actions">
          <button class="generate-button" type="submit">GENERUJ DRUK</button>
          <div class="secondary-actions">
            <button class="secondary-button" id="previewButton" type="button">Odśwież podgląd</button>
            <button class="secondary-button" id="clearButton" type="button">Wyczyść</button>
          </div>
          <div id="message" class="message" role="status" aria-live="polite"></div>
        </div>
      </form>
    </section>

    <section class="preview-panel" aria-label="Podgląd druku">
      <div class="preview-heading">
        <h2>Podgląd druku</h2>
        <span>2 kopie PPWG</span>
      </div>
      <div id="printArea" class="print-page"></div>
    </section>
  </main>

  <template id="copyTemplate">
    <section class="payment-copy">
      <div class="blankiet">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="side-title">Polecenie przelewu / wpłata gotówkowa</div>
        <div class="side-bank">odcinek dla banku</div>

        <div class="form-main">
          <span class="field-caption">nazwa odbiorcy</span>
          <div class="box-row top-name-1" data-cells="27" data-value="receiverLine1"></div>

          <span class="field-caption" style="top: 10.8mm;">nazwa odbiorcy cd.</span>
          <div class="box-row top-name-2" data-cells="27" data-value="receiverLine2"></div>

          <div class="lk-box">
            <span class="field-caption">l.k.</span>
          </div>

          <span class="field-caption" style="top: 19mm; left: 21.8mm;">nr rachunku odbiorcy</span>
          <div class="account-row receiver-account" data-cells="26" data-value="accountNumber"></div>

          <div class="payment-kind" aria-hidden="true">
            <span>W</span>
            <span>P</span>
            <span class="star">*</span>
          </div>

          <div class="currency-box">
            <span class="field-caption">waluta</span>
            <div class="currency-value">PLN</div>
          </div>

          <div class="amount-box">
            <span class="field-caption">kwota</span>
            <div class="amount-row" data-cells="12" data-value="amountForCells" data-align="right"></div>
          </div>

          <span class="field-caption payer-account-caption">nr rachunku zleceniodawcy (przelew) / kwota słownie (wpłata)</span>
          <div class="box-row payer-account" data-cells="27" data-value="amountWordsLine"></div>

          <span class="field-caption" style="top: 45.2mm;">nazwa zleceniodawcy</span>
          <div class="box-row payer-name-1" data-cells="27" data-value="payerLine1"></div>

          <span class="field-caption" style="top: 53.7mm;">nazwa zleceniodawcy cd.</span>
          <div class="box-row payer-name-2" data-cells="27" data-value="payerLine2"></div>

          <span class="field-caption" style="top: 62.0mm;">tytułem</span>
          <div class="box-row title-1" data-cells="27" data-value="titleLine1"></div>

          <span class="field-caption" style="top: 70.5mm;">tytułem cd.</span>
          <div class="box-row title-2" data-cells="27" data-value="titleLine2"></div>

        </div>

        <div class="bottom-strip">
          <div class="bank-note">dla banku: sprawdzić zgodność numeru rachunku</div>
          <div class="signature-box">
            <strong class="signature-date" data-text="paymentDate"></strong>
            <span>pieczęć, data i podpis(y) zleceniodawcy</span>
          </div>
          <div class="fee-box"><span>Opłata:</span></div>
          <div class="stamp-box"><div class="stamp-circle"></div></div>
          <div class="form-number">06</div>
          <div class="copy-number"></div>
        </div>
      </div>
    </section>
  </template>

  <script>
    const STORAGE_KEY = "ppwgGeneratorData";
    const form = document.getElementById("ppwgForm");
    const printArea = document.getElementById("printArea");
    const template = document.getElementById("copyTemplate");
    const message = document.getElementById("message");
    const fields = [
      "receiverName",
      "receiverAddress",
      "accountNumber",
      "amount",
      "paymentDate",
      "payerName",
      "payerAddress",
      "paymentTitle"
    ];

    function valueOf(id) {
      return document.getElementById(id).value.trim();
    }

    function setMessage(text, isError) {
      message.textContent = text;
      message.classList.toggle("error", Boolean(isError));
    }

    function todayIso() {
      const now = new Date();
      const offset = now.getTimezoneOffset() * 60000;
      return new Date(now.getTime() - offset).toISOString().slice(0, 10);
    }

    function formatDateForPrint(isoDate) {
      if (!isoDate) {
        return "";
      }
      const parts = isoDate.split("-");
      if (parts.length !== 3) {
        return isoDate;
      }
      return `${parts[2]}.${parts[1]}.${parts[0]}`;
    }

    function cleanAccount(value) {
      return value.replace(/\D/g, "").slice(0, 26);
    }

    function formatAccountForInput(value) {
      const digits = cleanAccount(value);
      const groups = [];
      if (digits.length > 0) {
        groups.push(digits.slice(0, 2));
      }
      for (let index = 2; index < digits.length; index += 4) {
        groups.push(digits.slice(index, index + 4));
      }
      return groups.filter(Boolean).join(" ");
    }

    function formatMoney(value) {
      const normalized = value.replace(/\s/g, "").replace(",", ".");
      const number = Number(normalized);
      if (!Number.isFinite(number) || number <= 0) {
        return "";
      }
      return number.toLocaleString("pl-PL", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function normalizeForCells(value) {
      return value
        .replace(/\s+/g, " ")
        .trim()
        .toLocaleUpperCase("pl-PL");
    }

    function splitIntoCellRows(value, cellsPerRow, rowCount) {
      const words = normalizeForCells(value).split(" ").filter(Boolean);
      const rows = [];
      let current = "";

      words.forEach((word) => {
        const candidate = current ? `${current} ${word}` : word;
        if (candidate.length <= cellsPerRow) {
          current = candidate;
          return;
        }
        rows.push(current);
        current = word;
      });

      if (current) {
        rows.push(current);
      }

      const clipped = rows.slice(0, rowCount);
      while (clipped.length < rowCount) {
        clipped.push("");
      }
      return clipped;
    }

    function amountForCells(value) {
      return value.replace(/\s/g, "").replace(",", ",");
    }

    function dateDigits(value) {
      return value.replace(/\D/g, "");
    }

    function parseMoney(value) {
      const normalized = value.replace(/\s/g, "").replace(",", ".");
      const number = Number(normalized);
      return Number.isFinite(number) ? number : 0;
    }

    function pluralForm(number, one, few, many) {
      const lastTwo = number % 100;
      const last = number % 10;
      if (number === 1) {
        return one;
      }
      if (last >= 2 && last <= 4 && (lastTwo < 12 || lastTwo > 14)) {
        return few;
      }
      return many;
    }

    function integerToPolishWords(number) {
      const ones = ["", "jeden", "dwa", "trzy", "cztery", "pięć", "sześć", "siedem", "osiem", "dziewięć"];
      const teens = ["dziesięć", "jedenaście", "dwanaście", "trzynaście", "czternaście", "piętnaście", "szesnaście", "siedemnaście", "osiemnaście", "dziewiętnaście"];
      const tens = ["", "", "dwadzieścia", "trzydzieści", "czterdzieści", "pięćdziesiąt", "sześćdziesiąt", "siedemdziesiąt", "osiemdziesiąt", "dziewięćdziesiąt"];
      const hundreds = ["", "sto", "dwieście", "trzysta", "czterysta", "pięćset", "sześćset", "siedemset", "osiemset", "dziewięćset"];
      const scales = [
        ["", "", ""],
        ["tysiąc", "tysiące", "tysięcy"],
        ["milion", "miliony", "milionów"]
      ];

      if (number === 0) {
        return "zero";
      }

      function triadWords(value) {
        const parts = [];
        const hundred = Math.floor(value / 100);
        const rest = value % 100;
        if (hundred) {
          parts.push(hundreds[hundred]);
        }
        if (rest >= 10 && rest < 20) {
          parts.push(teens[rest - 10]);
        } else {
          const ten = Math.floor(rest / 10);
          const one = rest % 10;
          if (ten) {
            parts.push(tens[ten]);
          }
          if (one) {
            parts.push(ones[one]);
          }
        }
        return parts;
      }

      const parts = [];
      let remaining = Math.floor(Math.abs(number));
      let scaleIndex = 0;

      while (remaining > 0 && scaleIndex < scales.length) {
        const triad = remaining % 1000;
        if (triad) {
          const triadParts = triadWords(triad);
          const scale = scales[scaleIndex];
          if (scaleIndex > 0) {
            triadParts.push(pluralForm(triad, scale[0], scale[1], scale[2]));
          }
          parts.unshift(triadParts.join(" "));
        }
        remaining = Math.floor(remaining / 1000);
        scaleIndex += 1;
      }

      return parts.join(" ");
    }

    function amountToWords(value) {
      const number = parseMoney(value);
      const whole = Math.floor(number);
      const cents = Math.round((number - whole) * 100);
      const wholeWords = `${integerToPolishWords(whole)} ${pluralForm(whole, "złoty", "złote", "złotych")}`;
      if (!cents) {
        return wholeWords;
      }
      return `${wholeWords} ${integerToPolishWords(cents)} ${pluralForm(cents, "grosz", "grosze", "groszy")}`;
    }

    function collectData() {
      const amount = formatMoney(valueOf("amount"));
      const receiverFull = [valueOf("receiverName"), valueOf("receiverAddress")].filter(Boolean).join("\n");
      const payerFull = [valueOf("payerName"), valueOf("payerAddress")].filter(Boolean).join("\n");
      const receiverLines = splitIntoCellRows(receiverFull, 27, 2);
      const payerLines = splitIntoCellRows(payerFull, 27, 2);
      const titleLines = splitIntoCellRows(valueOf("paymentTitle"), 27, 2);
      return {
        receiverName: valueOf("receiverName"),
        receiverAddress: valueOf("receiverAddress"),
        receiverFull,
        receiverLine1: receiverLines[0],
        receiverLine2: receiverLines[1],
        accountNumber: cleanAccount(valueOf("accountNumber")),
        amount,
        amountForCells: amountForCells(amount),
        amountWordsLine: amount ? amountToWords(amount) : "",
        paymentDate: formatDateForPrint(valueOf("paymentDate")),
        dateDigits: dateDigits(formatDateForPrint(valueOf("paymentDate"))),
        payerName: valueOf("payerName"),
        payerAddress: valueOf("payerAddress"),
        payerFull,
        payerLine1: payerLines[0],
        payerLine2: payerLines[1],
        paymentTitle: valueOf("paymentTitle"),
        titleLine1: titleLines[0],
        titleLine2: titleLines[1]
      };
    }

    function saveData() {
      const data = {};
      fields.forEach((id) => {
        data[id] = document.getElementById(id).value;
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadData() {
      try {
        const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        fields.forEach((id) => {
          if (stored[id]) {
            document.getElementById(id).value = stored[id];
          }
        });
      } catch (error) {
        localStorage.removeItem(STORAGE_KEY);
      }

      if (!valueOf("paymentDate")) {
        document.getElementById("paymentDate").value = todayIso();
      }
      document.getElementById("accountNumber").value = formatAccountForInput(valueOf("accountNumber"));
    }

    function renderCells(container, value, count, alignRight) {
      const chars = Array.from(String(value || "")).slice(0, count);
      const startIndex = alignRight ? Math.max(count - chars.length, 0) : 0;
      container.textContent = "";
      for (let index = 0; index < count; index += 1) {
        const box = document.createElement("span");
        box.className = "char-cell";
        box.textContent = chars[index - startIndex] || "";
        container.appendChild(box);
      }
    }

    function renderCopy(copyNumber, data) {
      const fragment = template.content.cloneNode(true);
      fragment.querySelector(".copy-number").textContent = `egzemplarz ${copyNumber}`;
      fragment.querySelectorAll("[data-cells]").forEach((node) => {
        const key = node.getAttribute("data-value");
        const count = Number(node.getAttribute("data-cells"));
        const alignRight = node.getAttribute("data-align") === "right";
        renderCells(node, data[key] || "", count, alignRight);
      });
      fragment.querySelectorAll("[data-text]").forEach((node) => {
        const key = node.getAttribute("data-text");
        node.textContent = data[key] || "";
      });
      return fragment;
    }

    function renderPrint() {
      const data = collectData();
      printArea.textContent = "";
      printArea.appendChild(renderCopy(1, data));

      const cutLine = document.createElement("div");
      cutLine.className = "cut-line";
      printArea.appendChild(cutLine);

      printArea.appendChild(renderCopy(2, data));
    }

    function clearErrors() {
      fields.forEach((id) => {
        document.getElementById(id).classList.remove("field-error");
      });
    }

    function markError(id) {
      document.getElementById(id).classList.add("field-error");
    }

    function validateForm() {
      clearErrors();
      const errors = [];

      if (!valueOf("receiverName")) {
        errors.push("Wpisz nazwę odbiorcy.");
        markError("receiverName");
      }
      if (cleanAccount(valueOf("accountNumber")).length !== 26) {
        errors.push("Numer rachunku powinien mieć 26 cyfr.");
        markError("accountNumber");
      }
      if (!formatMoney(valueOf("amount"))) {
        errors.push("Wpisz poprawną kwotę, np. 123,45.");
        markError("amount");
      }
      if (!valueOf("paymentDate")) {
        errors.push("Wybierz datę.");
        markError("paymentDate");
      }
      if (!valueOf("payerName")) {
        errors.push("Wpisz nazwę zleceniodawcy lub wpłacającego.");
        markError("payerName");
      }
      if (!valueOf("paymentTitle")) {
        errors.push("Wpisz tytuł wpłaty.");
        markError("paymentTitle");
      }

      if (errors.length > 0) {
        setMessage(errors.join(" "), true);
        return false;
      }

      setMessage("Druk gotowy. Otwieram okno drukowania.", false);
      return true;
    }

    document.getElementById("accountNumber").addEventListener("blur", (event) => {
      event.target.value = formatAccountForInput(event.target.value);
      saveData();
      renderPrint();
    });

    document.getElementById("amount").addEventListener("blur", (event) => {
      const formatted = formatMoney(event.target.value);
      if (formatted) {
        event.target.value = formatted;
      }
      saveData();
      renderPrint();
    });

    fields.forEach((id) => {
      document.getElementById(id).addEventListener("input", () => {
        saveData();
        renderPrint();
      });
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      if (!validateForm()) {
        return;
      }
      saveData();
      renderPrint();
      window.setTimeout(() => window.print(), 120);
    });

    document.getElementById("previewButton").addEventListener("click", () => {
      clearErrors();
      saveData();
      renderPrint();
      setMessage("Podgląd odświeżony.", false);
    });

    document.getElementById("clearButton").addEventListener("click", () => {
      fields.forEach((id) => {
        document.getElementById(id).value = "";
      });
      document.getElementById("paymentDate").value = todayIso();
      localStorage.removeItem(STORAGE_KEY);
      clearErrors();
      renderPrint();
      setMessage("Formularz wyczyszczony.", false);
    });

    loadData();
    renderPrint();
  </script>
</body>
</html>
